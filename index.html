                setIsResearching(true); setCreateError('');
                const channelType = CHANNEL_TYPES.find(t => t.code === selectedChannelType) || CHANNEL_TYPES[0];
                const systemPrompt = "Você é um pesquisador de textos bíblicos, tradição católica e espiritualidade cristã.";
                const prompt = `Atue como pesquisador-chefe para um canal de ${channelType.label} em italiano. Tema do próximo vídeo: "${videoTitle}"

Crie um "Dossiê de Fontes e Referências" robusto com material para embasar um roteiro devocional.

O Dossiê deve conter obrigatoriamente:
1. Referências bíblicas relevantes com textos completos e citações (livro, capítulo, versículo).
2. Tradição católica sobre San Michele Arcangelo relacionada ao tema.
3. Exemplos de santos ou figuras bíblicas que vivenciaram a mesma dor do espectador.
4. Ângulo conceitual central — o reframe espiritual/teológico único deste vídeo.
5. Sugestões de testemunhos típicos do público italiano 50-70 anos que se identificaria com este tema.

🚨 NÃO ESCREVA UM ROTEIRO AQUI. Retorne apenas anotações brutas de pesquisa para um roteirista.`;
                try {
                    const resultText = await fetchAI(prompt, systemPrompt, selectedModel, claudeApiKey, geminiApiKey, selectedModel.includes('gemini'));
                    setVideoSources(prev => prev ? prev + "\n\n=== DOSSIÊ GERADO PELA IA ===\n\n" + resultText : resultText);
                } catch (err) { setCreateError("Erro ao pesquisar: " + err.message); }
                finally { setIsResearching(false); }
            };

            const handleExtractDNA = async () => {
                if (!referenceScripts.trim()) { setDnaError("Cole ou anexe arquivos de referência primeiro."); return; }
                setDnaError(''); setIsExtractingDNA(true);
                try {
                    const text = await fetchAI(DNA_EXTRACTION_PROMPT(referenceScripts), "Você é um Analista Especialista de Audiência e Linguagem do YouTube especializado em canais de espiritualidade italiana.", selectedModel, claudeApiKey, geminiApiKey);
                    setChannelDNA(text);
                    alert("DNA extraído com sucesso! Revise e ajuste se necessário.");
                } catch (err) { setDnaError("Falha: " + err.message); }
                finally { setIsExtractingDNA(false); }
            };

            const handleAddToQueue = () => {
                if (!videoTitle.trim() || !videoSources.trim()) { setCreateError("Título e Fontes são obrigatórios."); return; }
                setCreateError('');
                const newScript = {
                    id: Date.now(), title: videoTitle.trim(), sources: videoSources.trim(),
                    wordCountTarget: parseInt(wordCount) || 3000, status: 'pending',
                    content: '[AGUARDANDO GERAÇÃO DA INTRODUÇÃO BASEADA NO ROTEIRO]\n\n',
                    totalParts: 6, completedParts: 0, modelUsed: selectedModel,
                    personaSnapshot: personaConfig, dnaSnapshot: channelDNA,
                    languageSnapshot: selectedLanguage, channelTypeSnapshot: selectedChannelType
                };
                setScripts(prev => [...prev, newScript]);
                setVideoTitle(''); setVideoSources('');
                setActiveTab('queue');
                if (!isProcessing) { setIsProcessing(true); processingRef.current = true; }
            };

            const cleanText = (text) => {
                let cleaned = text;
                cleaned = cleaned.replace(/^(BLOCO|Bloco|PARTE|Parte|INTRODUÇÃO|Introdução)\s*\d*.*$/gmi, '');
                cleaned = cleaned.replace(/^(?:Gancho Impactante|Panorama do Tema|Escalada da Curiosidade|Ganchos em Forma de Pergunta|Transição|TAREFA|NIVELAMENTO|PROTOCOLO|FECHAMENTO).*?:/gmi, '');
                cleaned = cleaned.replace(/^\[.*?\]$/gm, '');
                cleaned = cleaned.replace(/^#+\s*.*/gm, '');
                cleaned = cleaned.replace(/^\*\*.*:\*\*$/gm, '');
                cleaned = cleaned.replace(/\n{3,}/g, '\n\n');
                return cleaned.trim();
            };

            const generatePartWithRetry = async (scriptData, partNum, previousText) => {
                let promptData;
                if (partNum === 5) {
                    const bodyText = previousText.replace('[AGUARDANDO GERAÇÃO DA INTRODUÇÃO BASEADA NO ROTEIRO]\n\n', '');
                    promptData = buildIntroPrompt(scriptData, scriptData.dnaSnapshot, scriptData.personaSnapshot, bodyText);
                } else {
                    promptData = buildPartPrompt(partNum, scriptData, scriptData.dnaSnapshot, scriptData.personaSnapshot, previousText);
                }
                for (let attempt = 1; attempt <= 4; attempt++) {
                    try {
                        const text = await fetchAI(promptData.user, promptData.system, scriptData.modelUsed, claudeApiKey, geminiApiKey);
                        return cleanText(text);
                    } catch (err) {
                        console.error(`Tentativa ${attempt} falhou na parte ${partNum}:`, err);
                        if (attempt === 4) throw err;
                        await new Promise(res => setTimeout(res, 4000));
                    }
                }
            };

            useEffect(() => {
                if (!isProcessing) return;
                const processQueue = async () => {
                    const pending = scripts.filter(s => s.status === 'pending');
                    const processing = scripts.filter(s => s.status === 'processing');
                    if (pending.length === 0 && processing.length === 0) { setIsProcessing(false); processingRef.current = false; return; }
                    if (processing.length >= 1 || pending.length === 0) return;
                    const currentScript = pending[0];
                    setScripts(prev => prev.map(s => s.id === currentScript.id ? { ...s, status: 'processing' } : s));
                    let accumulatedText = currentScript.content;
                    try {
                        for (let partNum = 1; partNum <= 5; partNum++) {

                                accumulatedText = accumulatedText.replace('[AGUARDANDO GERAÇÃO DA INTRODUÇÃO BASEADA NO ROTEIRO]\n\n', '');

                            } else {
                                accumulatedText += (accumulatedText.endsWith('\n') ? "" : "\n\n") + partText;

                            setScripts(prev => prev.map(s => s.id === currentScript.id ? { ...s, completedParts: partNum, content: accumulatedText } : s));

                        setScripts(prev => prev.map(s => s.id === currentScript.id ? { ...s, completedParts: 5, revisingStatus: true } : s));
                        const revPrompt = buildRevisionPrompt(currentScript, currentScript.dnaSnapshot, currentScript.personaSnapshot, accumulatedText);

                    } catch (error) {
                        accumulatedText += `\n\n[ERRO CRÍTICO: ${error.message}]`;
                        setScripts(prev => prev.map(s => s.id === currentScript.id ? { ...s, status: 'error', content: accumulatedText } : s));
                    }

            }, [scripts, isProcessing]);

            const copyToClipboard = (text) => navigator.clipboard.writeText(text);

            const countWords = (text) => text ? text.trim().split(/\s+/).length : 0;

                        {activeTab === 'config' && (

                                                <div className="animate-spin text-violet-400"><Icons.Loader2 /></div>
                                                <div>
                                                    <h4 className="font-bold text-violet-100 text-lg">Forjando Roteiro...</h4>
                                                    <p className="text-sm text-violet-300/80 mt-1">A Introdução é gerada por último. Após isso, o Agente de Revisão (10 critérios San Michele) faz a correção final.</p>
                                                </div>
                                            </div>
                                        )}
                                        {scripts.map((script) => {
                                            const scriptChannelType = CHANNEL_TYPES.find(t => t.code === (script.channelTypeSnapshot || 'oracao_sao_miguel')) || CHANNEL_TYPES[0];
                                            return (
                                                <div key={script.id} className={`rounded-2xl overflow-hidden flex flex-col transition-all duration-300 shadow-xl ${script.status === 'processing' ? 'bg-slate-900 border-2 border-violet-500 scale-[1.01]' : script.status === 'completed' ? 'bg-slate-900 border border-slate-700' : 'bg-slate-900/40 border border-slate-800 opacity-70'}`}>
                                                    <div className="p-5 bg-slate-800/40 border-b border-slate-700/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${script.status === 'completed' ? 'bg-emerald-500/20 text-emerald-400' : script.status === 'processing' && script.revisingStatus ? 'bg-rose-500/20 text-rose-400' : script.status === 'processing' ? 'bg-violet-500/20 text-violet-400' : script.status === 'error' ? 'bg-red-500/20 text-red-400' : 'bg-slate-800 text-slate-500'}`}>
                                                                {script.status === 'completed' ? <Icons.CheckCircle /> : script.status === 'processing' ? <div className="animate-spin"><Icons.Loader2 /></div> : script.status === 'error' ? <Icons.AlertCircle /> : <Icons.Layers />}
                                                            </div>
                                                            <div>
                                                                <h3 className="font-bold text-white text-lg">{script.title}</h3>
                                                                {script.status === 'processing' ? (
                                                                    <p className={`text-xs font-mono mt-1 ${script.revisingStatus ? 'text-rose-400' : script.completedParts === 4 ? 'text-violet-400' : 'text-violet-300'}`}>
                                                                        {script.revisingStatus ? `Agente de Revisão (10 critérios San Michele) operando...` : script.completedParts === 4 ? 'Lendo o roteiro e forjando a Introdução...' : `Escrevendo: Etapa ${script.completedParts + 1} de 5`}
                                                                    </p>
                                                                ) : (
                                                                    <p className="text-xs text-slate-400 font-mono mt-1">{script.status === 'completed' ? `Finalizado — Revisado (${scriptChannelType.icon} ${scriptChannelType.label})` : script.status === 'error' ? 'Erro na geração' : 'Aguardando vez'}</p>
                                                                )}
                                                            </div>
                                                        </div>
                                                        {script.status === 'completed' && (
                                                            <div className="flex gap-2">
                                                                <button onClick={() => downloadTxt(script.title, script.content)} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-white text-sm font-medium transition-colors flex items-center gap-2"><Icons.Save /> Baixar TXT</button>
                                                                <button onClick={() => copyToClipboard(script.content)} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-white text-sm font-medium transition-colors flex items-center gap-2"><Icons.Copy /> Copiar</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="relative">
                                                        {script.status === 'processing' && (
                                                            <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center p-8">
                                                                <div className="w-full max-w-md bg-slate-800 rounded-full h-3 mb-4 overflow-hidden border border-slate-700">
                                                                    <div className={`h-full transition-all duration-500 ${script.revisingStatus ? 'bg-rose-500' : script.completedParts === 4 ? 'bg-violet-500' : 'bg-violet-600'}`} style={{width: `${(script.completedParts / script.totalParts) * 100}%`}}></div>
                                                                </div>
                                                                <div className="flex justify-between w-full max-w-md text-[9px] sm:text-[10px] text-slate-500 font-mono font-medium uppercase tracking-wider">
                                                                    <span className={script.completedParts >= 1 ? 'text-violet-400' : ''}>1. Gancho</span>
                                                                    <span className={script.completedParts >= 2 ? 'text-violet-400' : ''}>2. São Miguel</span>
                                                                    <span className={script.completedParts >= 3 ? 'text-violet-400' : ''}>3. Decreto</span>
                                                                    <span className={script.completedParts >= 4 ? 'text-violet-400' : ''}>4. Fechamento</span>
                                                                    <span className={script.completedParts >= 5 ? 'text-violet-400 font-bold' : (script.completedParts === 4 ? 'text-violet-400 animate-pulse font-bold' : '')}>5. Intro</span>
                                                                    <span className={script.completedParts >= 6 ? 'text-rose-400 font-bold' : (script.revisingStatus ? 'text-rose-400 animate-pulse font-bold' : '')}>6. Revisão</span>
                                                                </div>
                                                            </div>
                                                        )}
                                                        {script.content && (
                                                            <div className="flex flex-col">
                                                                <textarea value={script.content} onChange={(e) => { const val = e.target.value; setScripts(prev => prev.map(s => s.id === script.id ? { ...s, content: val } : s)); }}
                                                                    className={`w-full ${script.status === 'completed' ? 'h-[600px]' : 'h-64'} bg-[#090e1a] border-none p-8 text-slate-300 text-[15px] leading-relaxed resize-y focus:ring-0 outline-none`}></textarea>
                                                                <div className="bg-slate-900 border-t border-slate-800 p-4 text-xs text-slate-500 flex justify-between items-center font-mono">
                                                                    <span>~{countWords(script.content)} palavras</span>
                                                                    <div className="flex gap-3 items-center">
                                                                        {script.status === 'completed' && <span className="text-rose-700">✓ revisado</span>}
                                                                        <span className="text-violet-700">{scriptChannelType.icon} {scriptChannelType.label}</span>
                                                                        <span className="text-sky-700">🇮🇹 it</span>
                                                                        {script.personaSnapshot && <span className="text-violet-700">🛡️ persona</span>}
                                                                        <span className="bg-slate-800 px-2 py-1 rounded">{script.modelUsed}</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
